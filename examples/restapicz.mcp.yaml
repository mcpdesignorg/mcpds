mcpds: "1.0"
server:
  name: cz.restapi/mcp
  title: REST API Design Guide
  description: Provides documentation for REST API Design
  version: 1.0.0
  websiteUrl: https://www.restapi.cz
  authors:
    - name: Miroslav Holec
      url: https://holec.ai
  license: MIT
capabilities:
  completions: false
  tools:
    listChanged: false
  resources:
    subscribe: false
    listChanged: false
  prompts:
    listChanged: false
  logging: false
transports:
  - type: streamable-http
    url: https://www.restapi.cz/mcp
    headers:
      - name: x-api-key
        description: Authentication using an API key (token)
        isRequired: true
        isSecret: true
  - type: stdio
auth:
  schemes:
    none:
      type: oauth2
      flows: {}
packaging:
  packages:
    - registryType: npm
      transport:
        type: stdio
      identifier: mcpdesigner
      version: 1.0.0
tools:
  - name: fetch
    title: Fetch Documentation
    description: Returns relevant snippets for the given prompt. Use it for semantic search across the whole system based on the prompt.
    inputSchema:
      type: object
      properties:
        phrase:
          type: string
          description: Search phrase
          minLength: 3
          maxLength: 20
        take:
          type: integer
          description: Number of records
          minimum: 1
          maximum: 20
        page:
          type: number
          description: Page in the search results
          minimum: 1
          maximum: 10
      additionalProperties: false
      required: []
    outputSchema:
      type: object
      properties:
        Results:
          type: array
          items:
            type: string
            description: Found content
          description: Search results
          minItems: 0
          maxItems: 20
        ID:
          type: string
          description: Content ID for looking up records
      required: []
    annotations:
      readOnlyHint: true
resources: []
prompts:
  - name: fetch
    title: Fetch
    arguments:
      - name: phrase
        description: Searchable phrase
        required: true
